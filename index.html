<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITE SIGN-IN | Construction Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- QR Code Library CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
    <header class="rugged-header">
        <h1>CONSTRUCTION HUB</h1>
        <div class="header-controls">
            <button id="nav-login-btn" class="rugged-button small primary">LOGIN</button>
            <div id="status-bar" class="status-bar">
                SYSTEM READY // <span id="current-time">00:00</span>
            </div>
        </div>
    </header>

    <main id="app">
        <!-- Views will be injected here -->
        <div id="view-container" class="view-container">
            <div class="loader">INITIALIZING...</div>
        </div>
    </main>

    <footer class="rugged-footer">
        &copy; 2026 SITE-SECURE // RUGGED SYSTEMS
    </footer>

    <!-- Application Templates -->
    <template id="tpl-home">
        <section class="view home-view">
            <h2 class="section-title">WELCOME</h2>
            <div class="rugged-card">
                <p class="large-text">CONSTRUCTION SITE MANAGEMENT SYSTEM</p>
                <p>Access the supervisor dashboard or sign-in to a specific site via QR code.</p>
                <div style="margin-top: 2rem;">
                    <button id="home-login-btn" class="rugged-button primary">ADMIN LOGIN</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-admin-pin">
        <section class="view admin-pin">
            <h2 class="section-title">SUPERVISOR LOGIN</h2>
            <div class="rugged-card">
                <div class="form-group">
                    <label>USERNAME</label>
                    <input type="text" id="admin-user-input" class="rugged-input" placeholder="Enter Username">
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <div class="pin-input-container">
                        <input type="password" id="admin-pin-input" placeholder="Enter Password" class="rugged-input">
                        <button type="button" id="pin-toggle-btn" class="pin-toggle">SHOW</button>
                    </div>
                </div>
                
                <div id="auth-actions">
                    <button id="admin-login-btn" class="rugged-button primary">SIGN IN</button>
                    <p style="text-align: center; margin: 1rem 0; font-size: 0.8rem; color: #888;">NEW SUPERVISOR?</p>
                    <button id="go-to-register-btn" class="rugged-button secondary small">CREATE NEW ACCOUNT</button>
                </div>

                <p id="auth-error" class="error-text hidden">INVALID CREDENTIALS // ACCESS DENIED</p>
            </div>
        </section>
    </template>

    <template id="tpl-admin-register">
        <section class="view admin-register">
            <h2 class="section-title">CREATE ACCOUNT</h2>
            <div class="rugged-card">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" id="reg-fullname" class="rugged-input" placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" id="reg-email" class="rugged-input" placeholder="supervisor@example.com">
                </div>
                <div class="form-group">
                    <label>USERNAME</label>
                    <input type="text" id="reg-username" class="rugged-input" placeholder="Choose a Username">
                </div>
                <div class="form-group">
                    <label>PASSWORD</label>
                    <input type="password" id="reg-password" class="rugged-input" placeholder="Min 4 characters">
                </div>
                
                <div id="reg-actions">
                    <button id="admin-register-btn" class="rugged-button primary">REGISTER & SIGN IN</button>
                    <button id="back-to-login-btn" class="rugged-button secondary small">BACK TO LOGIN</button>
                </div>

                <p id="reg-error" class="error-text hidden"></p>
            </div>
        </section>
    </template>

    <template id="tpl-live-logs">
        <section class="view live-logs">
            <h2 class="section-title">LIVE HEADCOUNT</h2>
            <div class="rugged-card">
                <div class="headcount-hero">
                    <span class="label">CURRENT ON SITE:</span>
                    <span id="log-count" class="count-value">0</span>
                </div>
                
                <div class="log-table-container">
                    <table class="rugged-table">
                        <thead>
                            <tr>
                                <th>NAME</th>
                                <th>COMPANY</th>
                                <th>TIME</th>
                            </tr>
                        </thead>
                        <tbody id="log-entries">
                            <!-- Entries injected here -->
                        </tbody>
                    </table>
                </div>

                <div class="no-print screen-controls" style="margin-top: 2rem;">
                    <button class="rugged-button secondary" id="back-to-dashboard">BACK TO DASHBOARD</button>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-admin-dashboard">
        <section class="view admin-dashboard">
            <h2 class="section-title">DASHBOARD</h2>

            <nav class="tactical-tabs">
                <button id="tab-setup" class="tab-btn active">
                    <i class="fas fa-tools"></i> SITE SETUP
                </button>
                <button id="tab-sites" class="tab-btn">
                    <i class="fas fa-list-ul"></i> ACTIVE SITES
                </button>
            </nav>
            
            <div id="setup-view" class="tab-content">
                <div class="tactical-container">
                    <h3 class="sidebar-title">GENERATE NEW SITE</h3>
                    <form id="site-setup-form">
                        <div class="setup-grid">
                            <div class="form-column">
                                <div class="floating-group">
                                    <i class="fas fa-map-marker-alt field-icon"></i>
                                    <input type="text" id="site-name" required class="rugged-input floating-input" placeholder=" ">
                                    <label class="floating-label">SITE NAME</label>
                                </div>
                                <div class="floating-group">
                                    <i class="fas fa-envelope field-icon"></i>
                                    <input type="email" id="site-email" required class="rugged-input floating-input" placeholder=" ">
                                    <label class="floating-label">CONTACT EMAIL</label>
                                </div>
                            </div>
                            <div class="form-column">
                                <div class="upload-container">
                                    <label class="modern-upload-btn">
                                        <i class="fas fa-cloud-upload-alt"></i>
                                        <span>SITE MAP</span>
                                        <input type="file" id="site-map" accept="image/*" required class="hidden-upload">
                                    </label>
                                    <div id="site-map-preview" class="file-pill hidden">
                                        <i class="fas fa-file-image"></i>
                                        <span class="pill-text"></span>
                                    </div>
                                </div>
                                <div class="upload-container">
                                    <label class="modern-upload-btn">
                                        <i class="fas fa-camera"></i>
                                        <span>OFFICE PHOTO</span>
                                        <input type="file" id="site-office-photo" accept="image/*" required class="hidden-upload">
                                    </label>
                                    <div id="site-office-preview" class="file-pill hidden">
                                        <i class="fas fa-file-image"></i>
                                        <span class="pill-text"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                        <button type="submit" class="rugged-button primary" style="margin-top: 2rem;">
                            <i class="fas fa-plus-circle" style="margin-right: 10px;"></i>GENERATE SITE ACCESS
                        </button>
                    </form>
                </div>
            </div>

            <div id="active-sites-view" class="tab-content hidden">
                <div id="active-sites-container" class="tactical-container">
                    <h3 class="sidebar-title">MANAGED SITES</h3>
                    <div id="active-sites-list" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                        <!-- Sites injected here -->
                    </div>
                </div>
            </div>
        </section>
    </template>

    <template id="tpl-poster">
        <section class="view poster-view">
            <div class="poster-container print-only">
                <h1 id="poster-site-name">SITE NAME</h1>
                <div id="qrcode-container"></div>
                <p class="poster-instruction">SCAN TO SIGN-IN</p>
            </div>
            <div class="no-print screen-controls">
                <button class="rugged-button primary" id="preview-site">PREVIEW SIGN-IN PAGE</button>
                <button class="rugged-button secondary" onclick="window.print()">PRINT POSTER</button>
                <button class="rugged-button" id="back-to-admin">BACK TO DASHBOARD</button>
            </div>
        </section>
    </template>

    <template id="tpl-signin">
        <section class="view signin-view">
            <h2 id="signin-site-name" class="section-title">SITE SIGN-IN</h2>
            <div class="rugged-card" id="signin-form-container">
                <form id="signin-form">
                    <div class="form-group">
                        <label>FIRST NAME</label>
                        <input type="text" id="fname" required class="rugged-input">
                    </div>
                    <div class="form-group">
                        <label>LAST NAME</label>
                        <input type="text" id="lname" required class="rugged-input">
                    </div>
                    <div class="form-group">
                        <label>COMPANY</label>
                        <input type="text" id="company" required class="rugged-input">
                    </div>
                    <div class="form-group">
                        <label>HAVE YOU BEEN ORIENTATED TO THIS SITE?</label>
                        <div class="radio-group">
                            <button type="button" class="rugged-button choice-btn" data-value="yes">YES</button>
                            <button type="button" class="rugged-button choice-btn" data-value="no">NO</button>
                        </div>
                    </div>
                    <button type="submit" id="submit-signin" class="rugged-button primary hidden">SIGN IN</button>
                </form>
            </div>
            <div id="orientation-warning" class="rugged-card warning hidden">
                <h3 class="hazard-text">GO TO SITE OFFICE</h3>
                <p class="warning-subtext">Report to the location shown below for orientation.</p>
                <div class="image-gallery">
                    <div>
                        <label>SITE MAP</label>
                        <img id="display-site-map" src="" alt="Site Map">
                    </div>
                    <div>
                        <label>SITE OFFICE</label>
                        <img id="display-office-photo" src="" alt="Site Office">
                    </div>
                </div>
                <button id="warning-reload-btn" class="rugged-button">RELOAD</button>
            </div>
            <div id="success-msg" class="rugged-card success hidden">
                <h3>SIGNED IN SUCCESSFULLY</h3>
                <p>Stay safe on site today.</p>
                <button id="success-back-btn" class="rugged-button">BACK</button>
            </div>
        </section>
    </template>

    <script src="js/store.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
